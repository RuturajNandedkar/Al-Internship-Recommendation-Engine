name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Frontend Dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Frontend Lint
        run: >-
          npx eslint src --ext .ts,.tsx --no-eslintrc --rule '{"no-unused-vars": "warn"}' --ignore-pattern "**/*.d.ts"
      - name: Build Frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps
      - name: Run Backend Lint
        run: >-
          cd backend && npx eslint . --ext .ts --no-eslintrc --rule '{"no-unused-vars": "warn"}'
